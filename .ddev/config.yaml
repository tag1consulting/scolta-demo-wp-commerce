name: terra-collecta
type: wordpress
php_version: "8.3"
webserver_type: nginx-fpm
router_http_port: "80"
router_https_port: "443"
mariadb_version: "10.11"
docroot: ""
timezone: America/New_York
composer_version: "2"
web_environment:
  - SCOLTA_API_KEY=SCOLTA_API_KEY_PLACEHOLDER
hooks:
  post-start:
    - exec: "cd /var/www/html/wp-content/plugins/scolta && composer install --no-interaction --no-dev"
    - exec-host: "[ -f db/dump.sql.gz ] && ddev import-db --file=db/dump.sql.gz || true"
    - exec: "wp option update siteurl 'https://terra-collecta.ddev.site' 2>/dev/null || true"
    - exec: "wp option update home 'https://terra-collecta.ddev.site' 2>/dev/null || true"
    - exec: "wp plugin activate woocommerce 2>/dev/null || echo 'WARNING: WooCommerce activation failed — check wp-content/plugins/woocommerce/ exists'"
